global
    log /dev/log local0
    log /dev/log local1 notice
    maxconn 4096
    daemon

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5s
    timeout client  30s
    timeout server  30s
    option  forwardfor
    option  http-server-close

#─── Frontend + API entrypoint ─────────────────────────────────────────────────
frontend pycrest_http
    bind *:80
    default_backend pycrest_k8s_nodes

#─── K8s worker nodes (NodePort 30080 pointing at Gateway) ──────────────────────
backend pycrest_k8s_nodes
    balance roundrobin
    option  httpchk GET /health
    # Replace with your actual worker node private IPs
    server worker1 10.0.1.101:30080 check inter 5s fall 3 rise 2
    server worker2 10.0.1.102:30080 check inter 5s fall 3 rise 2

#─── Stats page ─────────────────────────────────────────────────────────────────
listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats auth admin:pycrest_admin_2024