apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pycrest-main-route
  namespace: {{ .Values.global.namespace }}
spec:
  parentRefs:
    - name: {{ .Values.global.gateway.name }}
      namespace: {{ .Values.global.gateway.namespace }}
  rules:
    # Health check — served directly by frontend nginx
    - matches:
        - path:
            type: Exact
            value: /health
      backendRefs:
        - name: frontend
          port: 80

    # ALL /api/* traffic goes to api-gateway
    # api-gateway's server.js handles path rewriting to each microservice
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: api-gateway
          port: 3000

    # Frontend SPA — catch-all
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: 80