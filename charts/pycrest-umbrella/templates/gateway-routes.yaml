apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pycrest-main-route
  namespace: {{ .Values.global.namespace }}
spec:
  parentRefs:
    - name: {{ .Values.global.gateway.name }}
      namespace: {{ .Values.global.gateway.namespace }}
  rules:
    # 1. HAProxy Health Check (Highest Priority)
    - matches:
        - path:
            type: Exact
            value: /health
      backendRefs:
        - name: api-gateway
          port: 3000

    # 2. API Traffic
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: api-gateway
          port: 3000

    # 3. Frontend / UI (Catch-all)
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: 80