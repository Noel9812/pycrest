apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: verification-service-route
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.global.gateway.name }}
      namespace: {{ .Values.global.gateway.namespace }}
  rules:
    # Verification dashboard, KYC review, document review, scoring
    - matches:
        - path:
            type: PathPrefix
            value: /api/verification
      backendRefs:
        - name: verification-service
          port: 8000