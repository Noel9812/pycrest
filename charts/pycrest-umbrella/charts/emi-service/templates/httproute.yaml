apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: emi-service-route
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.global.gateway.name }}
      namespace: {{ .Values.global.gateway.namespace }}
  rules:
    # EMI schedules and monitoring
    - matches:
        - path:
            type: PathPrefix
            value: /api/emi
      backendRefs:
        - name: emi-service
          port: 8000
    # Admin EMI monitoring panel
    - matches:
        - path:
            type: PathPrefix
            value: /api/admin/emi
      backendRefs:
        - name: emi-service
          port: 8000