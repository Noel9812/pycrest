apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: frontend-role
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: frontend
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: frontend-rolebinding
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: frontend
subjects:
  - kind: ServiceAccount
    name: frontend-sa
    namespace: {{ .Values.global.namespace }}
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: frontend-role