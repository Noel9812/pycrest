apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: loan-service-route
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.global.gateway.name }}
      namespace: {{ .Values.global.gateway.namespace }}
  rules:
    # Customer loan portal: apply, status, sanction letter, docs
    - matches:
        - path:
            type: PathPrefix
            value: /api/customer
      backendRefs:
        - name: loan-service
          port: 8000
    # Loan-specific routes (sanction letters, emi-details, settlement, foreclose)
    - matches:
        - path:
            type: PathPrefix
            value: /api/loans
      backendRefs:
        - name: loan-service
          port: 8000
    # Internal loan endpoint (called by admin-service for sanction generation)
    - matches:
        - path:
            type: PathPrefix
            value: /internal/loans
      backendRefs:
        - name: loan-service
          port: 8000