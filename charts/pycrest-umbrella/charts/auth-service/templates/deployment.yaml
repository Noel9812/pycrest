apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount | default 2 }}
  minReadySeconds: {{ include "common.minReadySeconds" . }}
  selector:
    matchLabels:
      {{- include "common.selectorLabels" . | nindent 6 }}
  strategy:
    {{- include "common.rollingUpdateStrategy" . | nindent 4 }}
  template:
    metadata:
      labels:
        {{- include "common.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/part-of: pycrest
    spec:
      serviceAccountName: auth-service-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      affinity:
        {{- include "common.podAntiAffinity" . | nindent 8 }}
      containers:
        - name: auth-service
          image: {{ include "common.image" . }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          envFrom:
            {{- include "common.envFrom" . | nindent 12 }}
          livenessProbe:
            {{- include "common.livenessProbe" . | nindent 12 }}
          readinessProbe:
            {{- include "common.readinessProbe" . | nindent 12 }}
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
          # auth-service has no file uploads — no volumeMounts needed