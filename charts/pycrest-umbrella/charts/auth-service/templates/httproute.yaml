apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: auth-service-route
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.global.gateway.name }}
      namespace: {{ .Values.global.gateway.namespace }}
  rules:
    # Token endpoint — POST /api/auth/token
    - matches:
        - path:
            type: PathPrefix
            value: /api/auth
      backendRefs:
        - name: auth-service
          port: 8000
    # /me, /register endpoints also routed through auth
    - matches:
        - path:
            type: Exact
            value: /register
      backendRefs:
        - name: auth-service
          port: 8000
    - matches:
        - path:
            type: Exact
            value: /me
      backendRefs:
        - name: auth-service
          port: 8000
    - matches:
        - path:
            type: Exact
            value: /token
      backendRefs:
        - name: auth-service
          port: 8000