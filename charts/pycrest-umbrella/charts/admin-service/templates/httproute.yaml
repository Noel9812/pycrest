apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: admin-service-route
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.global.gateway.name }}
      namespace: {{ .Values.global.gateway.namespace }}
  rules:
    # Admin dashboard, approvals, loan actions
    - matches:
        - path:
            type: PathPrefix
            value: /api/admin
      backendRefs:
        - name: admin-service
          port: 8000