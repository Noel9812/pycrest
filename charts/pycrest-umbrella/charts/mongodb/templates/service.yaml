apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: mongodb
spec:
  type: ClusterIP
  clusterIP: None          # Headless — required for StatefulSet DNS
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017
      name: mongo