apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: api-gateway-route
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: pycrest
spec:
  parentRefs:
    - name: {{ .Values.global.gateway.name }}
      namespace: {{ .Values.global.gateway.namespace }}
  rules:
    # All /api/* traffic goes to the api-gateway first.
    # The api-gateway then fans out to individual microservices internally.
    # This is the catch-all — must be listed AFTER more specific routes
    # if you have individual service HTTPRoutes, or use only this one.
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: api-gateway
          port: 3000