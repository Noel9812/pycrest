apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: wallet-service-route
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.global.gateway.name }}
      namespace: {{ .Values.global.gateway.namespace }}
  rules:
    # Customer wallet: balance, transactions, MPIN, debit, add-money
    - matches:
        - path:
            type: PathPrefix
            value: /api/wallet
      backendRefs:
        - name: wallet-service
          port: 8000
    # Internal wallet endpoints (called by payment-service and emi-service)
    # These are only reachable within the cluster — not exposed via HAProxy
    - matches:
        - path:
            type: PathPrefix
            value: /internal
      backendRefs:
        - name: wallet-service
          port: 8000