global:
  imageRegistry: ""
  imagePullPolicy: Always
  namespace: pycrest

  storageClassName: nfs-csi

  nfs:
    server: "10.0.1.27"
    basePath: /var/nfs/pycrest


  gateway:
    name: pycrest-gateway
    namespace: pycrest

  mongodb:
    uri: "mongodb://pycrest:pycrest123@mongodb-0.mongodb.pycrest.svc.cluster.local:27017/pycrest?authSource=admin"
    db: pycrest
    rootUser: pycrest
    rootPassword: pycrest123

  jwt:
    secret: pycrest_jwt_secret_devops_2024
    algorithm: HS256
    expireMinutes: "60"

  internalServiceToken: e9ccbcbfd93e305d56e67a751664bd4b79ed32b23a896cc71958b98008f0fbcb

  serviceUrls:
    auth:         http://auth-service.pycrest.svc.cluster.local:8000
    loan:         http://loan-service.pycrest.svc.cluster.local:8000
    emi:          http://emi-service.pycrest.svc.cluster.local:8000
    wallet:       http://wallet-service.pycrest.svc.cluster.local:8000
    payment:      http://payment-service.pycrest.svc.cluster.local:8000
    verification: http://verification-service.pycrest.svc.cluster.local:8000
    admin:        http://admin-service.pycrest.svc.cluster.local:8000
    manager:      http://manager-service.pycrest.svc.cluster.local:8000

mongodb:
  image:
    repository: mongo
    tag: "7.0"
  storage:
    size: 10Gi

"api-gateway":
  image:
    repository: chillmadiguys/api-gateway
    tag: v1.1.0
  replicaCount: 2
  minReadySeconds: 10
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

frontend:
  image:
    repository: chillmadiguys/frontend
    tag: v1.1.0
  replicaCount: 2
  minReadySeconds: 10
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

"admin-service":
  image:
    repository: chillmadiguys/admin-service
    tag: v1.1.0
  replicaCount: 1
  minReadySeconds: 15
  resources:
    requests:
      cpu: 100m
      memory: 256Mi      # raised from 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  hpa:
    minReplicas: 1
    maxReplicas: 3        # lowered from 4
    cpuThreshold: 70
    memoryThreshold: 85   # raised from 80

